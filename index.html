<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrera Mexi Teletón 2026</title>
    <style>
        /* Reseteo básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            overflow-x: hidden;
        }

        /* Barra de navegación superior */
        .navbar {
            background-color: #2c1b6b; /* Color morado oscuro de la barra */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        .nav-brand img {
            height: 35px; /* Ajuste del logo superior izquierdo */
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links img {
            height: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nav-links img:hover {
            transform: scale(1.05);
        }

        /* Fallback de texto para "Organizadores" ya que no había imagen para ese menú */
        .nav-text-fallback {
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-donar {
            height: 40px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-donar:hover {
            transform: scale(1.05);
        }

        /* Sección Principal (Hero) */
        .hero {
            position: relative;
            width: 100%;
            min-height: calc(100vh - 70px);
            background-image: url('image_42792a.png');
            background-size: cover;
            background-position: center bottom;
            display: flex;
            align-items: center;
            overflow: hidden;
            padding: 0 5%;
        }

        /* Contenedor Izquierdo (Textos y Botones) */
        .hero-content {
            width: 60%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logos-sponsor {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 5px;
            margin-left: 10px; 
        }

        .logo-trans {
            height: 45px;
            padding: 0;
            border-radius: 0;
            background-color: transparent; 
        }

        .logo-teleton {
            height: 60px;
        }

        /* Contenedor Izquierdo (Textos y Botones) */
        /* Contenedor Izquierdo (Textos y Botones) */
        .hero-content {
            width: 55%; 
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 0; 
        }

        .main-title {
            width: 100%;
            max-width: 750px; /* Recupera su tamaño imponente */
            margin-top: 10px; 
        }

        .btn-inscribete {
            height: 60px; 
            margin-top: 20px;
            margin-left: 20px; 
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-radius: 30px;
        }

        .btn-inscribete:hover {
            transform: scale(1.05);
        }

        /* Contenedor Derecho (Imágenes del Corredor y Hexágono) */
        /* Contenedor Derecho (Imágenes del Corredor y Hexágono) */
        .hero-visuals {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 60%; /* Damos más ancho al área de la imagen */
            height: 100%;
            z-index: 1;
        }

        .runner {
            position: absolute;
            bottom: -5%; /* Lo bajamos ligeramente para que el pie toque el borde */
            right: -25%; /* Lo empujamos agresivamente hacia la derecha */
            height: 125%; /* Lo hacemos más grande */
            object-fit: contain;
            mix-blend-mode: screen; 
        }

        .hexagon {
            position: absolute;
            bottom: 5%; /* Lo bajamos casi hasta el fondo */
            right: 22%; /* Lo anclamos más cerca del borde derecho */
            width: 200px; /* Ajustamos la escala para que empate con el corredor */
            z-index: 3;
            filter: drop-shadow(0px 15px 15px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s;
        }

        .hexagon:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* Responsividad básica para pantallas más pequeñas */
        @media (max-width: 1024px) {
            .hero-content { width: 70%; }
            .hero-visuals { width: 40%; opacity: 0.8; }
            .hexagon { width: 200px; bottom: 10%; }
        }

    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-brand">
            <img src="cabezera 1.png" alt="Carrera Mexi Teletón">
        </div>
        
        <nav class="nav-links">
            <img src="cabecera 2.png" alt="Información">
            <img src="cabecera 3.png" alt="Inscripción">
            <div class="nav-text-fallback">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                ORGANIZADORES
            </div>
            <img src="cabecera 5.png" alt="Patrocinadores">
            <img src="cabecera 6.png" alt="Contacto">
        </nav>

        <div class="nav-cta">
            <img src="cacecera 7.png" alt="Donar" class="btn-donar">
        </div>
    </header>

    <main class="hero">
        
        <div class="hero-content">
            <div class="logos-sponsor">
                <img src="icono.png" alt="Transcomunicador" class="logo-trans">
                <img src="acentro de autismo.png" alt="Centro Autismo Teletón" class="logo-teleton">
            </div>
            
            <img src="logo 1.png" alt="CARRERA MEXI TELETÓN 2026" class="main-title">
            
            <img src="inscribete.png" alt="Inscríbete Ahora" class="btn-inscribete">
        </div>

        <div class="hero-visuals">
            <img src="corredor.png" alt="Corredor Teletón" class="runner">
            <img src="hexagono.png" alt="Donativo $150.00 M.N." class="hexagon">
        </div>

    </main>

</body>
</html>
